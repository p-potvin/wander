name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Wander.slnx

      - name: Build
        run: dotnet build Wander.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Wander.Tests/Wander.Tests.csproj --no-build --configuration Release --logger "console;verbosity=normal"
